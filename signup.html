<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 · 굿즈샵</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="js/config.js" defer></script>
  <script src="js/supabase-client.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/auth-pages.js" defer></script>
</head>
<body>
  <nav id="nav"></nav>
  <main>
    <form id="signupForm" class="form-box">
      <h1>회원가입</h1>
      <label for="email">이메일</label>
      <input id="email" name="email" type="email" required placeholder="you@example.com" />
      <label for="password">비밀번호</label>
      <input id="password" name="password" type="password" required minlength="6" placeholder="6자 이상" />
      <button type="submit" class="btn">가입하기</button>
      <div id="msg"></div>
      <p class="hint">이미 계정이 있나요? <a href="login.html">로그인</a></p>
    </form>
  </main>
</body>
</html>
